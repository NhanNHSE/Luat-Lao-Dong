services:
  # --- Backend API ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lawbot-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./backend/scripts:/app/scripts
      - ./backend/data:/app/data
      - hf_cache:/root/.cache/huggingface
      - fastembed_cache:/root/.cache/fastembed
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - lawbot-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  # --- Frontend (Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lawbot-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - lawbot-network
    restart: unless-stopped

  # --- Qdrant Vector Database ---
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: lawbot-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lawbot-network
    restart: unless-stopped

  # --- PostgreSQL Database ---
  postgres:
    image: postgres:16-alpine
    container_name: lawbot-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lawbot} -d ${POSTGRES_DB:-lawbot_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lawbot-network
    restart: unless-stopped

# Named volumes (stored in Docker's Linux filesystem, not on NTFS)
volumes:
  postgres_data:
  qdrant_data:
  hf_cache:
  fastembed_cache:

networks:
  lawbot-network:
    driver: bridge
